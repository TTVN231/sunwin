<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
<title>🔥 TRUM CHOI BAN - SUNWIN v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif}
.game-frame{position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:1;background:#0a0a1a}
.mock-bg{position:fixed;inset:0;background:radial-gradient(circle at 30% 40%,#1a1f2a,#04060b);z-index:-1}
.info-note{position:fixed;bottom:16px;left:16px;color:rgba(255,215,100,.7);font-size:11px;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:999px;backdrop-filter:blur(8px);letter-spacing:.5px;z-index:2}

#vt-tool{position:fixed;top:80px;right:20px;background:linear-gradient(160deg,rgba(20,30,55,.78),rgba(8,14,30,.82));backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);border:1px solid rgba(255,215,100,.18);box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04) inset,0 0 30px rgba(255,200,60,.08);padding:14px 16px 12px;border-radius:24px;z-index:999999;user-select:none;cursor:grab;touch-action:none;color:#f4e9c8;font-family:'Poppins','Segoe UI',system-ui,sans-serif;width:280px;font-weight:500}
#vt-tool:active{cursor:grabbing}
#vt-tool.collapsed{width:auto;padding:6px 10px;border-radius:999px;background:linear-gradient(135deg,rgba(255,200,60,.35),rgba(255,80,80,.3))}

.vt-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;letter-spacing:1.4px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,215,100,.12)}
.vt-header .vt-brand{background:linear-gradient(90deg,#ffd86b,#ff7a59);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
.vt-header .vt-flag{font-size:9px;color:rgba(255,215,100,.7);letter-spacing:2px}
.vt-section-label{font-size:9px;letter-spacing:1.2px;color:rgba(255,215,100,.55);text-transform:uppercase;margin:8px 0 4px;font-weight:600}
.vt-history{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;padding:6px;background:rgba(0,0,0,.25);border-radius:14px}
.vt-history-dot{width:11px;height:11px;border-radius:50%;background:#555}
.vt-history-dot.TAI{background:#ff5577;box-shadow:0 0 6px rgba(255,85,119,.7)}
.vt-history-dot.XIU{background:#5be08a;box-shadow:0 0 6px rgba(91,224,138,.7)}

.vt-current{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.3);border-radius:14px;padding:8px 12px;margin-bottom:8px}
.vt-current-left{font-size:10px;color:rgba(255,215,100,.7)}
.vt-current-phien{font-size:13px;font-weight:700;color:#ffd86b;letter-spacing:.5px}
.vt-current-result{font-size:14px;font-weight:800}
.vt-current-result.TAI{color:#ff5577;text-shadow:0 0 8px rgba(255,85,119,.4)}
.vt-current-result.XIU{color:#5be08a;text-shadow:0 0 8px rgba(91,224,138,.4)}

.vt-predict-box{background:linear-gradient(145deg,rgba(255,120,80,.18),rgba(255,200,60,.12));border:1px solid rgba(255,215,100,.25);border-radius:18px;padding:10px 12px;margin-top:4px;box-shadow:0 4px 14px rgba(0,0,0,.3) inset;position:relative;overflow:hidden}
.vt-predict-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.vt-predict-head .lbl{font-size:10px;letter-spacing:1.4px;color:rgba(255,215,100,.85);font-weight:700;text-transform:uppercase}
.vt-predict-head .phien-next{font-size:12px;font-weight:800;color:#ffd86b;background:rgba(0,0,0,.35);padding:3px 10px;border-radius:999px}
.vt-predict-main{display:flex;align-items:center;gap:10px}
.vt-pred-dot{width:44px;height:44px;border-radius:50%;background:#777;flex-shrink:0;transition:all .4s}
.vt-pred-dot.TAI{background:radial-gradient(circle at 30% 30%,#ff8aa1,#ff3355);box-shadow:0 0 18px rgba(255,85,119,.7);animation:pulse 1.2s infinite alternate}
.vt-pred-dot.XIU{background:radial-gradient(circle at 30% 30%,#aaffc7,#2bd470);box-shadow:0 0 18px rgba(91,224,138,.7);animation:pulse 1.2s infinite alternate}
.vt-pred-dot.unknown{background:#555}
.vt-pred-dot.locked{filter:grayscale(.3) brightness(.85);animation:none}
.vt-pred-info{flex:1}
.vt-pred-label{font-size:22px;font-weight:900;letter-spacing:1px;line-height:1}
.vt-pred-label.TAI{color:#ff5577;text-shadow:0 0 10px rgba(255,85,119,.5)}
.vt-pred-label.XIU{color:#5be08a;text-shadow:0 0 10px rgba(91,224,138,.5)}
.vt-pred-conf{display:inline-block;margin-top:4px;font-size:10px;background:rgba(0,0,0,.4);padding:2px 8px;border-radius:999px;color:#ffd86b;font-weight:700}
.vt-phase-badge{display:inline-block;margin-left:4px;font-size:9px;background:rgba(0,0,0,.5);color:#ffd86b;padding:2px 7px;border-radius:999px;letter-spacing:.6px;font-weight:700}
.vt-phase-badge.lock{background:rgba(150,150,150,.35);color:#ddd}
.vt-phase-badge.roll{background:linear-gradient(90deg,#ff5060,#d4112a);color:#fff;animation:pulse 1s infinite alternate}
.vt-phase-badge.live{background:linear-gradient(90deg,#5be08a,#22aa55);color:#03260e}
.vt-countdown{position:absolute;top:8px;right:10px;font-size:9px;color:rgba(255,215,100,.55);font-weight:700;letter-spacing:1px}

/* === RED 3D DICE — improved === */
.vt-pred-dice{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:14px;perspective:600px}
.vt-die{
  width:40px;height:40px;border-radius:10px;
  background:radial-gradient(circle at 28% 22%,#ff6a78 0%,#e8112d 55%,#7a000f 100%);
  box-shadow:
    inset 0 -4px 5px rgba(0,0,0,.45),
    inset 0 2px 3px rgba(255,255,255,.35),
    0 4px 10px rgba(0,0,0,.55),
    0 0 14px rgba(255,40,60,.45);
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  padding:5px;gap:1px;position:relative;
  transform-style:preserve-3d;will-change:transform,filter;
}
.vt-die::after{content:"";position:absolute;inset:0;border-radius:10px;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 40%);pointer-events:none}
.vt-die .pip{
  width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,#e2e2e2 65%,#b8b8b8);
  box-shadow:inset 0 -1px 1px rgba(0,0,0,.35), 0 0 3px rgba(255,255,255,.55);
  align-self:center;justify-self:center;visibility:hidden;
}
.vt-die.rolling{
  animation:vt-roll-3d .55s cubic-bezier(.45,.05,.55,.95) infinite;
  box-shadow:
    inset 0 -4px 5px rgba(0,0,0,.45),
    inset 0 2px 3px rgba(255,255,255,.4),
    0 8px 22px rgba(255,40,60,.6),
    0 0 28px rgba(255,80,100,.85);
  filter:brightness(1.15) saturate(1.2);
}
.vt-die.rolling.d1{animation-delay:0s}
.vt-die.rolling.d2{animation-delay:.07s}
.vt-die.rolling.d3{animation-delay:.14s}
.vt-die.settle{animation:vt-settle .65s cubic-bezier(.34,1.56,.64,1)}
@keyframes vt-roll-3d{
  0%  {transform:translateY(0)    rotateX(0)    rotateY(0)    rotateZ(0)   scale(1.05)}
  20% {transform:translateY(-10px) rotateX(140deg) rotateY(90deg)  rotateZ(35deg) scale(1.18)}
  40% {transform:translateY(-4px)  rotateX(280deg) rotateY(200deg) rotateZ(75deg) scale(.95)}
  60% {transform:translateY(-12px) rotateX(420deg) rotateY(310deg) rotateZ(120deg) scale(1.16)}
  80% {transform:translateY(-2px)  rotateX(560deg) rotateY(420deg) rotateZ(160deg) scale(.98)}
  100%{transform:translateY(0)    rotateX(720deg) rotateY(540deg) rotateZ(200deg) scale(1.05)}
}
@keyframes vt-settle{
  0%  {transform:scale(.35) rotate(-30deg) translateY(-8px);filter:brightness(1.8) drop-shadow(0 0 14px rgba(255,80,100,.9))}
  40% {transform:scale(1.32) rotate(14deg) translateY(0);filter:brightness(1.3)}
  70% {transform:scale(.92) rotate(-4deg);filter:brightness(1.05)}
  100%{transform:scale(1)   rotate(0);filter:brightness(1)}
}

.vt-pred-tong{font-size:12px;color:#ffd86b;font-weight:700;margin-left:6px;background:rgba(0,0,0,.35);padding:4px 10px;border-radius:999px}

.vt-stats-summary{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.3);border-radius:12px;padding:6px 10px;margin-top:8px;font-size:11px;color:#ffd86b;font-weight:700}
.vt-stats-summary .ok{color:#5be08a}
.vt-stats-summary .err{color:#ff5577}
.vt-stats-table{margin-top:6px;max-height:130px;overflow-y:auto;background:rgba(0,0,0,.25);border-radius:12px;padding:6px 8px;font-size:10.5px}
.vt-stats-table::-webkit-scrollbar{width:4px}
.vt-stats-table::-webkit-scrollbar-thumb{background:rgba(255,215,100,.3);border-radius:4px}
.vt-stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 28px;gap:4px;padding:3px 2px;border-bottom:1px dashed rgba(255,215,100,.08);align-items:center}
.vt-stats-row.head{color:rgba(255,215,100,.55);font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(255,215,100,.15)}
.vt-stats-row .col-pred.TAI,.vt-stats-row .col-act.TAI{color:#ff5577;font-weight:700}
.vt-stats-row .col-pred.XIU,.vt-stats-row .col-act.XIU{color:#5be08a;font-weight:700}
.vt-stats-row .col-mark{text-align:center;font-weight:800}
.vt-stats-row .col-mark.ok{color:#5be08a}
.vt-stats-row .col-mark.err{color:#ff5577}
.vt-stats-empty{text-align:center;color:rgba(255,215,100,.4);padding:8px;font-size:10px}

.vt-stats-btn{width:100%;margin-top:10px;padding:8px 10px;border-radius:12px;border:1px solid rgba(255,215,100,.3);background:linear-gradient(135deg,rgba(255,200,60,.18),rgba(255,120,80,.18));color:#ffd86b;font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer}
.collapsed .vt-stats-btn{display:none}

#vt-stats-panel{position:fixed;top:90px;left:50%;transform:translateX(-50%);width:340px;max-width:92vw;background:linear-gradient(160deg,rgba(20,30,55,.92),rgba(8,14,30,.95));backdrop-filter:blur(22px) saturate(140%);border:1px solid rgba(255,215,100,.25);box-shadow:0 20px 60px rgba(0,0,0,.6);border-radius:20px;padding:14px 16px;z-index:1000000;color:#f4e9c8;font-family:'Poppins','Segoe UI',system-ui,sans-serif}
.vt-sp-header{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:800;color:#ffd86b;padding-bottom:10px;border-bottom:1px solid rgba(255,215,100,.15);margin-bottom:10px}
.vt-sp-close{cursor:pointer;font-size:14px;width:24px;height:24px;line-height:24px;text-align:center;border-radius:50%;background:rgba(255,255,255,.08)}
#vt-stats-panel .vt-stats-table{max-height:320px}

@keyframes pulse{from{transform:scale(.95);opacity:.85}to{transform:scale(1.05);opacity:1}}
.collapsed .vt-history,.collapsed .vt-current,.collapsed .vt-section-label,.collapsed .vt-predict-box .vt-predict-head,.collapsed .vt-pred-info,.collapsed .vt-header,.collapsed .vt-countdown{display:none}
.collapsed .vt-predict-box{background:none;border:none;padding:0;margin:0;box-shadow:none}
.collapsed .vt-predict-main{gap:0}
.collapsed .vt-pred-dot{width:30px;height:30px}
.collapsed .vt-pred-dice{margin-top:6px}
.collapsed .vt-die{width:26px;height:26px;padding:3px}
.collapsed .vt-die .pip{width:4px;height:4px}
</style>
